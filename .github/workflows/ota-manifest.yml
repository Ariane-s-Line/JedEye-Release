# Regenerates manifest.txt (what the device fetches via OTA_MANIFEST_URL) from the
# published GitHub release, so cutting a release is the only step -- no hand-edited
# manifest, and the device stays on the tiny key=value file (no JSON, no
# api.github.com 60/hour rate limit).
#
# Deployed at Ariane-s-Line/JedEye-Release/.github/workflows/ota-manifest.yml;
# this is the versioned reference copy (it does not run from the firmware repo).
#
# Convention: attach the slim OTA app image as a `*.bin` asset on the release
# (the nanorp2040connect-JEDEYE firmware.bin, < 1 MB). The NINA image is hosted
# in SebKister/nina-fw -- bump nina_version / nina_url below when it changes.
name: OTA manifest
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Build manifest.txt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
          fi
          APP_VERSION="${TAG#v}"  # device parses bare numeric; strip any leading v
          APP_URL="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
            --jq '[.assets[] | select(.name|endswith(".bin"))][0].browser_download_url')"
          if [ -z "$APP_URL" ] || [ "$APP_URL" = "null" ]; then
            echo "::error::release $TAG has no .bin asset (attach the OTA firmware.bin)"
            exit 1
          fi
          cat > manifest.txt <<EOF
          app_version=${APP_VERSION}
          app_url=${APP_URL}
          nina_version=3.0.1-captive
          nina_url=https://github.com/SebKister/nina-fw/releases/download/3.0.1-captive/NINA-arduino.mbed_nano.nanorp2040connect.bin
          EOF
          cat manifest.txt
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.txt
          if git diff --staged --quiet; then
            echo "manifest unchanged"
          else
            git commit -m "OTA manifest -> ${{ github.event.release.tag_name || 'latest release' }}"
            git push
          fi
